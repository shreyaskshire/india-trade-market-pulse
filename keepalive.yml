name: Keep scheduled workflows alive

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create keepalive commit when repo is nearing inactivity cutoff
        shell: bash
        run: |
          set -euo pipefail
          last_commit_epoch="$(git log -1 --format=%ct)"
          now_epoch="$(date +%s)"
          days_since_last_commit="$(( (now_epoch - last_commit_epoch) / 86400 ))"

          if [ "$days_since_last_commit" -lt 50 ]; then
            echo "Repository is active (${days_since_last_commit} days since last commit). No keepalive commit needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keep scheduled workflows active"
          git push
